<html>
    <head>
        <title>Página de Tassio</title>
    </head>
    <body>
        <nav>
            <a href="index.html">Início</a>
            <a href="sobre.html">Sobre mim</a>
            <a href="curriculo.html">Currículo</a>
            <a href="contato.html">Contato</a>
        </nav>
        <main>
            <section>
                <h1>Exemplo de validação</h1>
            </section>
            <section>
                <form method="post" action="resultado.html">
                    <fieldset>
                        <legend>Informações pessoais</legend>
                        <div>
                            <label for="nome">Nome completo:</label>
                            <input 
                                id="nome" 
                                type="text" 
                                name="nome" 
                                placeholder="Informe pelo menos 10 caracteres" 
                                required 
                                minlength="10"
                                maxlength="100"
                            />
                        </div>
                        <div>
                            <label for="email">E-mail:</label>
                            <input 
                                id="email" 
                                type="email" 
                                name="email" 
                                placeholder="Informe seu e-mail" 
                                required 
                            />
                        </div>
                        <div>
                            <label for="idade">Idade:</label>
                            <input 
                                id="idade" 
                                type="number" 
                                name="idade" 
                                placeholder="Informe sua idade" 
                                required
                                min="0"
                                max="120"
                            />
                        </div>
                        <div>
                            <label for="peso">Peso:</label>
                            <input 
                                id="peso" 
                                type="number" 
                                name="peso" 
                                placeholder="Informe seu peso" 
                                required
                                min="0"
                                max="300"
                                step="0.5"
                            />
                        </div>
                        <div>
                            <label for="placa">Placa do veículo:</label>
                            <input 
                                id="placa" 
                                type="text" 
                                name="placa" 
                                placeholder="Informe a placa do veículo" 
                                required 
                                minlength="7"
                                maxlength="7"
                                pattern="[A-Z]{3}[0-9]{4}"
                            />
                        </div>
                    </fieldset>
                    <fieldset>
                        <legend>Mensagem</legend>
                        <div>
                            <label for="assunto">Assunto:</label>
                            <select id="assunto" name="assunto" required>
                                <option value="">Selecione um assunto</option>
                                <option value="duvida">Dúvida</option>
                                <option value="sugestao">Sugestão</option>
                                <option value="outro">Outro</option>
                            </select>
                        </div>
                        <div>
                            <textarea 
                                id="mensagem" 
                                name="mensagem" 
                                placeholder="Escreva sua mensagem aqui" 
                                required
                            ></textarea>
                        </div>
                    </fieldset>
                    <button type="reset">Limpar</button>
                    <button type="submit">Enviar</button>
                </form>
            </section>
        </main>
        <footer>
            <a href="index.html">Copyright &#9858;</a>
            <p>&copy; 2026 Tassio Valle. Todos os direitos reservados.</p>
        </footer>
    </body>
</html>
