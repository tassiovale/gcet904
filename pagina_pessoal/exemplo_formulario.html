<html>

<head>
    <title>Página de Tassio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Finlandica+Text:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <nav>
        <a href="index.html">Início</a>
        <a href="sobre.html">Sobre mim</a>
        <a href="curriculo.html">Currículo</a>
        <a href="contato.html">Contato</a>
    </nav>
    <main>
        <section>
            <h1>Exemplo de formulário</h1>
        </section>
        <section>
            <form method="post" action="resultado.html">
                <fieldset class="grupoFieldSet">
                    <legend>Informações pessoais</legend>
                    <div class="campoFormulario">
                        <label for="nome">Nome:</label>
                        <input id="nome" type="text" name="nome" placeholder="Informe seu nome" required />
                        <small>Forneça o seu nome completo.</small>
                    </div>
                    <div class="campoFormulario">
                        <label for="email">E-mail:</label>
                        <input id="email" type="email" name="email" placeholder="Informe seu e-mail" required />
                    </div>
                </fieldset>
                <fieldset class="grupoFieldSet">
                    <legend>Mensagem</legend>
                    <div class="campoFormulario">
                        <label for="assunto">Assunto:</label>
                        <select id="assunto" name="assunto" required>
                            <option value="">Selecione um assunto</option>
                            <option value="duvida">Dúvida</option>
                            <option value="sugestao">Sugestão</option>
                            <option value="outro">Outro</option>
                        </select>
                    </div>
                    <div class="campoFormulario">
                        <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem aqui"
                            required></textarea>
                    </div>
                </fieldset>
                <button type="reset">Limpar</button>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
    <footer>
        <a href="index.html">Copyright &#9858;</a>
        <p>&copy; 2026 Tassio Valle. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
