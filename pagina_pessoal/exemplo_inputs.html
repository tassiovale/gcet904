<html>
    <head>
        <title>Página de Tassio</title>
    </head>
    <body>
        <nav>
            <a href="index.html">Início</a>
            <a href="sobre.html">Sobre mim</a>
            <a href="curriculo.html">Currículo</a>
            <a href="contato.html">Contato</a>
        </nav>
        <main>
            <section>
                <h1>Exemplo de inputs</h1>
            </section>
            <section>
                <form method="post" action="resultado.html">
                    <fieldset>
                        <legend>Tipos de inputs</legend>
                        <div>
                            <label for="nome">Nome:</label>
                            <input 
                                id="nome" 
                                type="text" 
                                name="nome" 
                                placeholder="Informe seu nome" 
                                required 
                            />
                        </div>
                        <div>
                            <label for="email">E-mail:</label>
                            <input 
                                id="email" 
                                type="email" 
                                name="email" 
                                placeholder="Informe seu e-mail" 
                                required 
                            />
                        </div>
                        <div>
                            <label for="senha">Senha:</label>
                            <input 
                                id="senha" 
                                type="password" 
                                name="senha" 
                                placeholder="Informe sua senha" 
                                required 
                            />
                        </div>
                        <div>
                            <label for="telefone">Telefone:</label>
                            <input 
                                id="telefone" 
                                type="tel" 
                                name="telefone" 
                                placeholder="Informe seu telefone" 
                                required 
                            />
                        </div>
                        <div>
                            <label for="numero">Número:</label>
                            <input 
                                id="numero" 
                                type="number" 
                                name="numero" 
                                placeholder="Informe seu número"
                                min="0"
                                max="10" 
                                required 
                            />
                        </div>
                        <div>
                            <label for="data">Data e hora:</label>
                            <input 
                                id="data" 
                                type="date" 
                                name="data" 
                                placeholder="Informe a data" 
                                required 
                            />
                            <input 
                                id="hora" 
                                type="time" 
                                name="hora" 
                                placeholder="Informe a hora" 
                                required 
                            />
                        </div>
                        <div>
                            <label for="dataHora">Data/hora:</label>
                            <input 
                                id="dataHora" 
                                type="datetime-local" 
                                name="dataHora" 
                                placeholder="Informe a data e a hora" 
                                required 
                            />
                        </div>
                        <div>
                            <label for="range">Range:</label>
                            <input 
                                id="range" 
                                type="range" 
                                name="range" 
                                required 
                            />
                        </div>
                        <div>
                            <label for="arquivo">Arquivo:</label>
                            <input 
                                id="arquivo" 
                                type="file" 
                                name="arquivo" 
                                required 
                            />
                        </div>
                        <div>
                            <label for="cor">Cor:</label>
                            <input 
                                id="cor" 
                                type="color" 
                                name="cor" 
                                required 
                            />
                        </div>
                    </fieldset>
                    <fieldset>
                        <legend>Checkboxes</legend>
                        <div>
                            <input type="checkbox" id="marcador1" name="marcador1" />
                            <label for="marcador1">Marcador 1</label>
                        </div>
                        <div>
                            <input type="checkbox" id="marcador2" name="marcador2" />
                            <label for="marcador2">Marcador 2</label>
                        </div>
                    </fieldset>
                    <fieldset>
                        <legend>Radio buttons</legend>
                        <div>
                            <input type="radio" id="opcao1" name="opcao" value="opcao1" />
                            <label for="opcao1">Opção 1</label>
                        </div>
                        <div>
                            <input type="radio" id="opcao2" name="opcao" value="opcao2" />
                            <label for="opcao2">Opção 2</label>
                        </div>
                        <div>
                            <input type="radio" id="opcao3" name="opcao" value="opcao3" />
                            <label for="opcao3">Opção 3</label>
                        </div>
                    </fieldset>

                    <button type="reset">Limpar</button>
                    <button type="submit">Enviar</button>
                </form>
            </section>
        </main>
        <footer>
            <a href="index.html">Copyright &#9858;</a>
            <p>&copy; 2026 Tassio Valle. Todos os direitos reservados.</p>
        </footer>
    </body>
</html>
