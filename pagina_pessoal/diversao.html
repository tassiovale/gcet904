<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Diversão com o JavaScript</title>
    <link rel="stylesheet" href="styles/diversao.css">
    <script src="scripts/diversao.js" defer></script>
</head>

<body>
    <main>
        <section class="container">
            <h1>Diversão com o JavaScript</h1>
            <span class="titulo-surpresa">Digite o seu nome e veja a surpresa!</span>
            <div>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome aqui">
            </div>
            <button type="button" onclick="exibirSurpresa()">Clique e veja a surpresa</button>
            <span id="surpresa"></span>
        </section>
    </main>
</body>

</html>
